<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to the Bot Dashboard</h1>
    </header>
    <main>
        <section id="status">
            <h2>Current Status</h2>
            <p>The bot is currently online.</p>
        </section>
        <section id="controls">
            <h2>Bot Controls</h2>
            <button id="start">Start Bot</button>
            <button id="stop">Stop Bot</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Bot Dashboard</p>
    </footer>
</body>
</html>
